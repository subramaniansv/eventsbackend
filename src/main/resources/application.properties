# ── Jackson ──────────────────────────────────────────────────────────────────
# Serialize LocalDateTime as ISO-8601 strings, not epoch-millis arrays.
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.social=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# ── Spring Security ───────────────────────────────────────────────────────────
# Suppress the "Using generated security password: ..." startup banner.
# We do NOT use Spring Security's default UserDetailsService.
spring.security.user.name=unused
spring.security.user.password=unused
